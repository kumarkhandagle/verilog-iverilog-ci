name: Icarus Verilog CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator
      - name: Run Lint
        run: verilator --lint-only --Wall --timing src/*.v tb/tb.v

  simulate:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus
        run: sudo apt-get update && sudo apt-get install -y iverilog
      - name: Compile
        run: iverilog -Wall -o sim.vvp src/*.v tb/tb.v
      - name: Run Simulation
        run: vvp sim.vvp

  coverage:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus + Covered
        run: sudo apt-get update && sudo apt-get install -y iverilog covered
      - name: Compile
        run: iverilog -Wall -o sim.vvp src/*.v tb/tb.v
      - name: Run Simulation + Coverage
        run: |
          vvp sim.vvp
          covered score -t tb -v src/adder.v tb/tb.v -vcd dump.vcd -o coverage.cdd
          covered report coverage.cdd > coverage_report.txt
          cat coverage_report.txt
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_report.txt