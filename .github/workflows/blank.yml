name: Icarus Verilog CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator
      - name: Lint Check
        run: verilator --lint-only --Wall src/*.v tb/tb.v

  simulate:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus
        run: sudo apt-get update && sudo apt-get install -y iverilog
      - name: Compile & Run
        run: |
          iverilog -Wall -o sim.vvp src/*.v tb/tb.v
          vvp sim.vvp

  coverage:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator

      - name: Run Coverage with Verilator
        run: |
          echo "=== Generating Code Coverage ==="
          verilator --cc --coverage --top-module adder \
            src/adder.v --exe tb/tb.v
          make -C obj_dir -f Vadder.mk
          ./obj_dir/Vadder +verilator+rand+reset+2
          verilator_coverage --annotate logs/coverage obj_dir/coverage.dat

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: logs/coverage/