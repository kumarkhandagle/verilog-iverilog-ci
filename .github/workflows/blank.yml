name: Verilog CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator

      - name: Run Coverage
        run: |
          echo "=== Setting up directories ==="
          mkdir -p obj_dir logs/coverage
          
          echo "=== Compiling with Verilator ==="
          verilator --cc --coverage \
            --top-module tb \
            -CFLAGS "-std=c++17" \
            src/adder.v tb/tb.v \
            --exe --build -j 4
          
          echo "=== Running simulation ==="
          timeout 30 ./obj_dir/Vtb || echo "Simulation exited (may be normal)"
          
          echo "=== Checking for coverage data ==="
          if [ -f obj_dir/coverage.dat ]; then
            echo "✓ coverage.dat found"
            verilator_coverage --annotate logs/coverage obj_dir/coverage.dat
            echo "✓ Coverage report generated"
          else
            echo "✗ coverage.dat NOT found - testbench may not have exited properly"
            exit 1
          fi

      - name: Display Coverage Results
        run: |
          echo "=== Coverage Report Files ==="
          find logs/coverage -type f | head -20
          echo ""
          echo "=== Sample Coverage Output ==="
          head -50 logs/coverage/adder.v.html || echo "No HTML files found"

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: logs/coverage/
          if-no-files-found: warn