name: Icarus Verilog CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator
      
      - name: Lint Check
        run: verilator --lint-only --Wall --timing src/*.v tb/tb.v

  simulate:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Icarus
        run: sudo apt-get update && sudo apt-get install -y iverilog
      
      - name: Compile & Run
        run: |
          iverilog -Wall -o sim.vvp src/*.v tb/tb.v
          timeout 30 vvp sim.vvp
        timeout-minutes: 2

  coverage:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator

      - name: Verify Source Files Exist
        run: |
          echo "=== Checking for source files ==="
          ls -la src/ tb/ || echo "WARN: Check your file structure"

      - name: Run Coverage with Proper Testbench
        run: |
          echo "=== Generating Code Coverage ==="
          mkdir -p logs/coverage
          
          # CRITICAL: Testbench MUST have $finish to exit simulation
          # Verilator cannot generate coverage if simulation hangs forever
          verilator --cc --coverage --top-module adder \
            -CFLAGS "-std=c++17" \
            src/adder.v tb/tb.v --exe --build -j 4
          
          # Run with timeout to prevent hanging
          timeout 30 ./obj_dir/Vadder || true
          
          # Generate coverage report
          if [ -f obj_dir/coverage.dat ]; then
            verilator_coverage --annotate logs/coverage obj_dir/coverage.dat
            echo "=== Coverage report generated successfully ==="
          else
            echo "ERROR: coverage.dat not found - simulation may have failed"
            exit 1
          fi

      - name: Check Coverage Output
        run: |
          echo "=== Checking coverage output ==="
          if [ -d logs/coverage ]; then
            find logs/coverage -type f | head -20
          else
            echo "No coverage directory found"
          fi

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: logs/coverage/
          if-no-files-found: warn