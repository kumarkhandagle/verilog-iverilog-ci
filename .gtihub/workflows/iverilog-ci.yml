name: Icarus Verilog CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog

      - name: Compile DUT + Testbench
        run: |
          # === CHANGE THE FILENAMES BELOW TO MATCH YOUR PROJECT ===
          iverilog -Wall -o simulation.vvp src/*.v tb/tb.v
          # Alternative for many files:
          # iverilog -Wall -o simulation.vvp *.v

      - name: Run Simulation
        run: vvp simulation.vvp